<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${viewModel.pageData.siteName} + ' — EPA Superfund Site | Site Plain'">Site Page</title>
  <meta name="description"
        th:content="${viewModel.pageData.siteName} + ' is an active EPA Superfund site in ' + viewModel.pageData.stateCode + '. Human exposure status: ' + viewModel.pageData.exposureStatusLabel + '. Enter your address to see your distance from this site.'">
  <link rel="canonical" th:href="@{/site/{epaId}(epaId=${viewModel.pageData.epaId})}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/site-plain.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<main class="container py-4">
  <article class="card shadow-sm p-4">
    <p class="eyebrow mb-2">EPA Superfund Site</p>
    <h1 class="display-6 mb-2" th:text="${viewModel.pageData.siteName}">Site Name</h1>
    <p class="text-muted mb-3">
      <span th:text="${viewModel.pageData.stateCode}">GA</span>
      <span class="mx-2">|</span>
      EPA ID <span th:text="${viewModel.pageData.epaId}">GA8213820731</span>
    </p>
    <div class="mb-3">
      <span th:replace="fragments/exposure-badge :: badge(${viewModel.pageData.exposureStatusCode}, ${viewModel.pageData.exposureStatusLabel})"></span>
    </div>
    <p th:if="${viewModel.pageData.exposurePathwayDescription != null and !#strings.isEmpty(viewModel.pageData.exposurePathwayDescription)}">
      About this site’s exposure pathways:
      <span th:utext="${viewModel.pageData.exposurePathwayDescription}">EPA text</span>
    </p>
    <form method="post" th:action="@{/lookup}" th:object="${lookupForm}" class="row g-3 mt-3">
      <div class="col-12">
        <label class="form-label fw-semibold">Enter your address to see how close you are to this site</label>
      </div>
      <div class="col-12 col-md-9">
        <input type="text" th:field="*{address}" class="form-control" placeholder="Enter a home address">
      </div>
      <div class="col-12 col-md-3">
        <button type="submit" class="btn btn-dark w-100">Check distance</button>
      </div>
    </form>
    <div class="mt-3">
      <a class="btn btn-outline-dark btn-sm" th:href="${viewModel.pageData.effectiveEpaUrl()}" target="_blank" rel="noopener">View EPA site profile</a>
    </div>
  </article>
  <div th:replace="fragments/disclaimer :: disclaimer"></div>
  <div th:replace="fragments/feedback-form :: feedback-form('site', ${viewModel.pageData.epaId})"></div>
</main>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
