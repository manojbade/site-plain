<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site Plain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/site-plain.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<main class="container py-5">
  <section class="hero card shadow-sm p-4 p-md-5">
    <p class="eyebrow mb-2">EPA Superfund Lookup</p>
    <h1 class="display-5 mb-3">What’s on the EPA priority list near your home?</h1>
    <p class="lead mb-4">
      <span th:text="${viewModel.totalPopulationText}">19.46 million</span> Americans live within 1 mile of an active Superfund site.
      <span th:text="${viewModel.totalDistrictsText}">357 of 435</span> congressional districts contain at least one active site.
    </p>
    <form method="post" th:action="@{/lookup}" th:object="${lookupForm}" class="row g-3">
      <div class="col-12 col-md-9">
        <input type="text" th:field="*{address}" class="form-control form-control-lg"
               placeholder="Enter a home address">
      </div>
      <div class="col-12 col-md-3">
        <button type="submit" class="btn btn-dark btn-lg w-100">Find nearby sites</button>
      </div>
      <div class="col-12 text-danger" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
    </form>
    <p class="text-muted small mt-3 mb-0">
      Data: EPA National Priorities List
      <span th:if="${viewModel.updatedDate != null}">
        , updated <span th:text="${viewModel.updatedDate}">2026-03-23</span>
      </span>
    </p>
  </section>
</main>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
