<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0574GW6TCV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0574GW6TCV');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About | Site Plain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/site-plain.css(v=2)}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<main class="container py-4">
  <section class="card shadow-sm p-4">
    <h1 class="display-6 mb-4">About Site Plain</h1>
    <h2 class="h4">Methodology</h2>
    <ul>
      <li th:each="point : ${viewModel.methodologyPoints}" th:text="${point}">Methodology point</li>
    </ul>
    <h2 class="h4 mt-4">Limitations</h2>
    <ul>
      <li th:each="point : ${viewModel.limitations}" th:text="${point}">Limitation</li>
    </ul>
    <h2 class="h4 mt-4">Data Sources</h2>
    <ul>
      <li th:each="source : ${viewModel.dataSources}" th:text="${source}">Source</li>
    </ul>
  </section>
  <div th:replace="fragments/disclaimer :: disclaimer"></div>
</main>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
