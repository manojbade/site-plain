<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0574GW6TCV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0574GW6TCV');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="'EPA Superfund Sites in ' + ${viewModel.stateName} + ' (' + ${viewModel.siteCount} + ' active sites) | Site Plain'">State Page</title>
  <meta name="description"
        th:content="${viewModel.siteCount} + ' active EPA Superfund sites in ' + viewModel.stateName + '. Enter your address to see how close you are to any of them.'">
  <link rel="canonical" th:href="@{/state/{code}(code=${viewModel.stateCode})}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/site-plain.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<main class="container py-4">
  <section class="card shadow-sm p-4 mb-4">
    <h1 class="display-6 mb-2" th:text="${viewModel.stateName} + ' EPA Superfund Sites'">State EPA Superfund Sites</h1>
    <p class="mb-3"><span th:text="${viewModel.siteCount}">0</span> active sites on the EPA National Priorities List</p>
    <form method="post" th:action="@{/lookup}" th:object="${lookupForm}" class="row g-3">
      <div class="col-12 col-md-9">
        <input type="text" th:field="*{address}" class="form-control" placeholder="Enter your address to find sites near you">
      </div>
      <div class="col-12 col-md-3">
        <button type="submit" class="btn btn-dark w-100">Find nearby sites</button>
      </div>
    </form>
  </section>

  <div class="vstack gap-3">
    <article class="card shadow-sm" th:each="site : ${viewModel.sites}">
      <div class="card-body d-flex justify-content-between align-items-start gap-3 flex-wrap">
        <div>
          <h2 class="h5 mb-2"><a th:href="@{/site/{epaId}(epaId=${site.epaId})}" th:text="${site.siteName}">Site Name</a></h2>
          <span th:replace="fragments/exposure-badge :: badge(${site.exposureStatusCode}, ${site.exposureStatusLabel})"></span>
        </div>
      </div>
    </article>
  </div>
</main>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
