spring.application.name=site-plain
spring.profiles.active=dev
server.port=8080

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

siteplain.data.bootstrapEnabled=${SITEPLAIN_DATA_BOOTSTRAP_ENABLED:true}
siteplain.data.refreshOnStartup=${SITEPLAIN_DATA_REFRESH_ON_STARTUP:false}
siteplain.data.maxAgeDays=${SITEPLAIN_DATA_MAX_AGE_DAYS:90}
siteplain.data.nplBoundariesUrl=${SITEPLAIN_DATA_NPL_BOUNDARIES_URL:}
siteplain.data.humanExposureUrl=${SITEPLAIN_DATA_HUMAN_EXPOSURE_URL:https://www3.epa.gov/semsjson/Human_Exposure_Site_List.json}

siteplain.geocoder.userAgent=${SITEPLAIN_GEOCODER_USER_AGENT:site-plain/0.0.1}
siteplain.site.baseUrl=${SITEPLAIN_BASE_URL:https://site-plain.com}
